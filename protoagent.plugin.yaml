# protoagent.plugin.yaml — DATA ONLY (the host reads this without importing code).
# Keep `version` in lockstep with pyproject.toml (tests/test_version.py asserts it).
id: pr-reviewer
name: PR reviewer (review machinery + structural engine)
version: 0.15.0
description: >-
  The deterministic half of the PR-review QA tier (protoAgent ADR 0078). Ships the
  `protopatch_review` tool — a budgeted, checkout-cached run of the protoPatch
  (`clawpatch`) structural analysis engine over a PR, its findings mapped into the
  ADR 0077 findings contract with `source: protopatch` — and the `structural-finder`
  subagent + `code-review-structural` workflow that seat it as a fifth, non-LLM
  member of the adversarial review panel (same dedup + independent verify as the
  LLM finders). Head/base SHAs are resolved server-side from the PR, never taken
  from the model. A timeout or missing engine degrades to a Gap, never an error —
  a partial structural pass must not void the panel review (ADR 0078 D3).
enabled: false                 # SHIP DISABLED — enabling is the operator's trust decision
repository: https://github.com/protoLabsAI/pr-reviewer-plugin
min_protoagent_version: "0.95.0"   # needs the findings `source` field (ADR 0078 B2 core half)

# Config (ADR 0019): defaults are the source of truth; langgraph-config.yaml overlays.
config_section: pr_reviewer
config:
  default_repo: ""             # repo the tool falls back to when `repo` is omitted (owner/name)
  repos: []                    # repos the DISPATCHER manages (owner/name) — the allowlist gate;
                               # empty = manual dispatch only, webhook drops everything
  shadow_mode: true            # true = every verdict posts as a COMMENT review (never blocks)
  promotion_owner: false       # true (AND shadow_mode false) = this agent owns COMMENTED→APPROVE
                               # promotion for its repos; two promoters racing double-merges
  cooldown_s: 30               # chokepoint window per repo#pr@sha (webhook burst collapse)
  allow_self_review: false     # TESTING ONLY: lift the never-review-your-own-PR rail
  sweep_interval_s: 180        # approve-on-green level sweep cadence
  webhook_secret: ""           # HMAC secret (or PR_REVIEWER_WEBHOOK_SECRET env; empty = 403 all)
  app_id: ""                   # GitHub App identity (or PROTOREVIEW_APP_ID env) — with the
                               # private key, a refresher keeps GH_TOKEN a fresh installation
                               # token (hourly expiry); empty = BYO GH_TOKEN (PAT/machine user)
  installation_id: ""          # optional (or PROTOREVIEW_APP_INSTALLATION_ID); auto-discovered
  clawpatch_bin: "clawpatch"   # the protoPatch CLI (npm: @protolabsai/protopatch)
  time_budget_s: 300           # hard wall-clock budget for one clawpatch run (SIGKILL past it)
  model: ""                    # clawpatch --model override; "" = its default (protolabs/smart)
  gateway_base_url: ""         # exported as OPENAI_BASE_URL to clawpatch; "" = its default
  checkout_root: ""            # "" = ~/.protoagent/pr-reviewer/checkouts
  state_root: ""               # "" = ~/.protoagent/pr-reviewer/clawpatch (per-repo state dirs)
  checkout_ttl_s: 3600         # cache entry freshness window (Quinn's model: ~token lifetime)
  checkout_max_entries: 50     # LRU prune caps (enforced on prune())
  checkout_max_bytes: 5000000000

# Secrets — routed to the untracked secrets.yaml overlay, never the main config.
# app_private_key: the App's PEM (or PROTOREVIEW_APP_PRIVATE_KEY env for headless).
secrets: [webhook_secret, app_private_key]

# Settings (ADR 0019) — surfaced as editable fields in the console.
settings:
  - {key: repos, label: "Managed repos (owner/name)", type: string_list}
  - {key: shadow_mode, label: "Shadow mode (verdicts as comments only)", type: bool}
  - {key: promotion_owner, label: "Own approve-on-green promotion (formal mode only)", type: bool}
  - {key: webhook_secret, label: "GitHub webhook secret", type: secret}
  - {key: app_id, label: "GitHub App ID (App identity)", type: string}
  - {key: app_private_key, label: "GitHub App private key (PEM)", type: secret}
  - {key: default_repo, label: "Default repo (owner/name)", type: string}
  - {key: time_budget_s, label: "protoPatch time budget (seconds)", type: int}
  - {key: model, label: "protoPatch model override", type: string}

# The webhook page-load can't carry a bearer — the HMAC inside the handler is the
# auth (no secret configured ⇒ every delivery 403s).
public_paths:
  - /plugins/pr-reviewer/webhook

# Auth: git clones + PR lookups use `gh`'s ambient auth or GITHUB_TOKEN/GH_TOKEN from
# the env; clawpatch's gateway provider reads GATEWAY_API_KEY or OPENAI_API_KEY (+
# OPENAI_BASE_URL). No plugin secret of its own.

# Declarative transparency (shown in the console; not yet enforced).
capabilities:
  network: ["api.github.com", "github.com"]  # gh + git clone; clawpatch talks to the LLM gateway
  filesystem: "checkout + state caches under ~/.protoagent/pr-reviewer (configurable)"
