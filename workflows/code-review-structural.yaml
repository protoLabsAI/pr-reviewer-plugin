# Adversarial code review, structural variant (ADR 0077 + ADR 0078 B2). The four
# LLM review-finders plus protoPatch as a fifth, NON-LLM finder (the
# structural-finder relay seat) — its findings enter the SAME dedup + independent
# verify + noise filtering as everything else, which is the edge over wiring the
# engine straight into a verdict. Dispatch picks THIS recipe when the structural
# trigger fires (>3 files / >120 lines / sensitive paths — ADR 0078 D2, Phase C);
# small diffs run the core four-finder `code-review` recipe instead — the engine
# has no conditional steps, recipe SELECTION is the trigger mechanism.
#
#   run_workflow("code-review-structural", {"pr": "1846"})
#   run_workflow("code-review-structural", {"pr": "69", "repo": "owner/name"})
#
# Needs the github plugin (finder/verifier reads) and this pr-reviewer plugin
# (protopatch_review + the structural-finder subagent). All steps speak the
# findings contract in graph/review/findings.py; protoPatch items carry
# `source: "protopatch"`. A protoPatch timeout degrades to the four-finder
# review with a Gap noted — the structural seat never fails the panel.
name: code-review-structural
description: >-
  Adversarial PR review with the structural engine seated — four parallel LLM
  finders (correctness, removed behavior, cross-file, conventions) plus a
  protoPatch structural pass (source: protopatch), dedup/rank, an
  evidence-checking verify pass, and a final findings block. Output ends with
  the canonical fenced findings JSON.
version: 1
inputs:
  - name: pr
    description: The pull-request number to review.
    required: true
  - name: repo
    description: Repository as owner/name (omit to use the configured default repo).
    default: ""
  - name: prior_findings
    description: >-
      Findings JSON from a previous review of this PR (optional). When present,
      finders run a DELTA re-review: drop what's fixed, carry forward what's
      still open, then look for new defects. GitHub-native review memory
      (ADR 0078 D5) — the caller recalls, the panel re-evaluates.
    default: "(none — first review of this PR)"
  - name: prior_requests
    description: >-
      Pre-rendered <prior_requests> data block: every change THIS panel has
      already asked for on this PR, round by round (optional). Distinct from
      prior_findings, which is only the last round's open items — this is the
      memory that stops a re-review re-litigating its own demands (issue #23).
    default: "(none — this panel has not reviewed this PR before)"
  - name: review_round
    description: >-
      Which round this is (1 = first review). Round 3+ means the diff under
      review is substantially the panel's own doing; finders weight accordingly.
    default: "1"
  - name: head_sha
    description: >-
      The PR's head SHA, resolved SERVER-SIDE by the dispatcher (optional).
      Finders pass it as `ref=` on code-context github_read_file calls — a
      plain read shows the default branch, not this PR's changes.
    default: ""
  - name: base_ref
    description: >-
      The PR's base ref, resolved SERVER-SIDE by the dispatcher (optional).
      The conventions finder reads policy docs (CLAUDE.md/PROTO.md) at this
      ref — never at the PR head, so a PR can't rewrite the rules it is
      judged by.
    default: ""
  - name: existing_threads
    description: >-
      Pre-rendered <pr_review_threads> data block of the inline review threads
      already on this PR (optional; the dispatcher fetches, escapes, wraps).
      Finders suppress candidates that overlap an existing thread by location
      or underlying defect — the panel must not re-post what's being discussed.
    default: "(none)"
steps:
  - id: find_correctness
    subagent: review-finder
    prompt: |
      Review PR #{{inputs.pr}} (repo: "{{inputs.repo}}" — empty means the
      default repo). Your assigned angle: **correctness**. Logic errors,
      off-by-ones, broken edge cases, error-handling gaps, races, wrong
      conditionals, unhandled None/empty/failure paths — does this code do what
      it claims under all inputs it will actually see?

      Server-resolved refs (empty when not provided): head SHA
      "{{inputs.head_sha}}", base ref "{{inputs.base_ref}}".

      ## Existing review threads
      {{inputs.existing_threads}}

      ## Prior findings
      <prior_findings>
      {{inputs.prior_findings}}
      </prior_findings>

      ## What this panel already asked for (round {{inputs.review_round}})
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests>

      Re-review discipline: code that exists BECAUSE of a request above is not
      novel surface. Verify it was implemented CORRECTLY — a wrong, partial or
      defect-introducing fix is absolutely still a finding. But do not report
      the requested change itself as unrequested scope, an unexplained
      behavioral change, or missing-a-test-it-never-had, and do not re-open a
      request a later head already satisfied. From round 3 on the diff is
      substantially the panel's own doing: prefer silence to a fresh minor on
      code this panel has already blessed. A review that never converges costs
      more than the nit it is holding out for.

  - id: find_removed_behavior
    subagent: review-finder
    prompt: |
      Review PR #{{inputs.pr}} (repo: "{{inputs.repo}}" — empty means the
      default repo). Your assigned angle: **removed or changed behavior**. Read
      the DELETED and rewritten lines: what did the old code do that the new
      code silently doesn't? Dropped guards, lost fallbacks, narrowed
      conditions, deleted call sites, semantics changed without the callers
      changing. Regressions hide on the minus side of the diff.

      Server-resolved refs (empty when not provided): head SHA
      "{{inputs.head_sha}}", base ref "{{inputs.base_ref}}".

      ## Existing review threads
      {{inputs.existing_threads}}

      ## Prior findings
      <prior_findings>
      {{inputs.prior_findings}}
      </prior_findings>

      ## What this panel already asked for (round {{inputs.review_round}})
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests>

      Re-review discipline: code that exists BECAUSE of a request above is not
      novel surface. Verify it was implemented CORRECTLY — a wrong, partial or
      defect-introducing fix is absolutely still a finding. But do not report
      the requested change itself as unrequested scope, an unexplained
      behavioral change, or missing-a-test-it-never-had, and do not re-open a
      request a later head already satisfied. From round 3 on the diff is
      substantially the panel's own doing: prefer silence to a fresh minor on
      code this panel has already blessed. A review that never converges costs
      more than the nit it is holding out for.

  - id: find_crossfile
    subagent: review-finder
    prompt: |
      Review PR #{{inputs.pr}} (repo: "{{inputs.repo}}" — empty means the
      default repo). Your assigned angle: **cross-file consistency**. Signatures
      changed but callers not updated, contracts/schemas drifting from their
      consumers, config keys renamed on one side only, docs/tests contradicting
      the new behavior. Use github_read_file on the files the diff touches
      indirectly — this angle is exactly the one a hunk-by-hunk read misses.

      Server-resolved refs (empty when not provided): head SHA
      "{{inputs.head_sha}}", base ref "{{inputs.base_ref}}".

      ## Existing review threads
      {{inputs.existing_threads}}

      ## Prior findings
      <prior_findings>
      {{inputs.prior_findings}}
      </prior_findings>

      ## What this panel already asked for (round {{inputs.review_round}})
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests>

      Re-review discipline: code that exists BECAUSE of a request above is not
      novel surface. Verify it was implemented CORRECTLY — a wrong, partial or
      defect-introducing fix is absolutely still a finding. But do not report
      the requested change itself as unrequested scope, an unexplained
      behavioral change, or missing-a-test-it-never-had, and do not re-open a
      request a later head already satisfied. From round 3 on the diff is
      substantially the panel's own doing: prefer silence to a fresh minor on
      code this panel has already blessed. A review that never converges costs
      more than the nit it is holding out for.

  - id: find_conventions
    subagent: review-finder
    prompt: |
      Review PR #{{inputs.pr}} (repo: "{{inputs.repo}}" — empty means the
      default repo). Your assigned angle: **conventions and hygiene**. The
      repo's own documented rules first — read its CLAUDE.md / PROTO.md /
      contributor docs with github_read_file at the BASE ref below (or the
      default branch when it's empty), never at the PR head — then: naming that
      lies, duplicated logic, dead/debug code left in, missing or weakened
      tests for changed behavior, secrets or scratch files in the diff.
      When the diff touches CI workflows, build/test scripts, or test-runner
      config, check test enforcement specifically: flag any suite that is no
      longer run, skipped, made non-blocking, or conditionally bypassed
      without an equivalent replacement — those are major, not nits.
      Severity honestly — most other convention findings are minor/nit.

      Server-resolved refs (empty when not provided): head SHA
      "{{inputs.head_sha}}", base ref "{{inputs.base_ref}}".

      ## Existing review threads
      {{inputs.existing_threads}}

      ## Prior findings
      <prior_findings>
      {{inputs.prior_findings}}
      </prior_findings>

      ## What this panel already asked for (round {{inputs.review_round}})
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests>

      Re-review discipline: code that exists BECAUSE of a request above is not
      novel surface. Verify it was implemented CORRECTLY — a wrong, partial or
      defect-introducing fix is absolutely still a finding. But do not report
      the requested change itself as unrequested scope, an unexplained
      behavioral change, or missing-a-test-it-never-had, and do not re-open a
      request a later head already satisfied. From round 3 on the diff is
      substantially the panel's own doing: prefer silence to a fresh minor on
      code this panel has already blessed. A review that never converges costs
      more than the nit it is holding out for.

  - id: find_structural
    subagent: structural-finder
    prompt: |
      Run the structural pass on PR #{{inputs.pr}} (repo: "{{inputs.repo}}" —
      empty means the default repo): call protopatch_review once and relay its
      findings verbatim. If the engine is unavailable, report the Gap it
      prescribes and an empty findings array — the panel proceeds without you.

  - id: synthesize
    subagent: review-synthesizer
    depends_on: [find_correctness, find_removed_behavior, find_crossfile, find_conventions, find_structural]
    prompt: |
      Merge these five review-finder reports on PR #{{inputs.pr}} into one
      deduped, ranked findings block (your standard procedure). The structural
      finder is the protoPatch engine — its findings carry `source:
      "protopatch"`; same rules as everyone else, preserve the attribution.

      ## Correctness finder
      {{steps.find_correctness.output}}

      ## Removed-behavior finder
      {{steps.find_removed_behavior.output}}

      ## Cross-file finder
      {{steps.find_crossfile.output}}

      ## Conventions finder
      {{steps.find_conventions.output}}

      ## Structural finder (protoPatch)
      {{steps.find_structural.output}}

  - id: verify
    subagent: verifier
    depends_on: [synthesize]
    prompt: |
      Verify these code-review findings against PR #{{inputs.pr}} (repo:
      "{{inputs.repo}}" — empty means the default repo). Re-read the actual
      diff with github_pr_diff (and github_read_file where a claim depends on
      surrounding code); annotate every finding with verdict
      confirmed/refuted/uncertain + a one-line note. Return the same fenced
      findings array, annotated — preserve every field, including `source`.

      Server-resolved refs (empty when not provided): head SHA
      "{{inputs.head_sha}}", base ref "{{inputs.base_ref}}".

      ## What this panel already asked for (round {{inputs.review_round}})
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests>

      A finding whose whole substance is "this code changed / lacks a test /
      isn't explained" where the change is one the panel itself requested above
      is REFUTED — the request is the explanation. A finding that the requested
      change was implemented wrongly, incompletely, or introduced a defect
      stands on its own evidence like any other.

      ## Grounding — the verdict follows the read, not the story

      Your verdict on each finding must be DERIVED from what you actually read,
      never from how convincing the finding sounds. Two failures to avoid, both
      observed in production:

      1. **Quoted code that isn't there.** Before confirming, read the cited
         file at head SHA "{{inputs.head_sha}}" with github_read_file and locate
         the finding's quoted code IN THAT FILE. If it isn't there (and isn't on
         the minus side of the diff for a removed-behavior claim), the finding
         is REFUTED — say which quote you could not find. A finding claiming
         "X was dropped" requires you to demonstrate X's ABSENCE in the actual
         file, not to find the claim plausible.

      2. **Decidable predicates you reasoned about instead of evaluating.** If a
         claim turns on what a string, prefix, regex, or comparison actually
         does — `"developer".startswith("dev.")`, `str(None)` being truthy, a
         glob matching a path — work the exact characters through, one by one,
         and write the result in your note. Do not reason "these look similar,
         so they match". A real panel confirmed that `"dev."` prefix-matches
         `"developer.env.TOKEN"`; it does not, because the fourth character is
         `e`, not `.`. That finding blocked a correct PR.

      If evidence you cannot ground is the ONLY support for a finding, mark it
      `uncertain`, not `confirmed` — uncertain never blocks a merge on its own,
      and a finding you could not verify has not earned a block.

      **Evidence already on the PR counts.** If an existing review thread above
      contains a refutation with a blob citation, or a test that asserts the
      behavior the finding disputes, that is evidence — weigh it. Confirming a
      finding whose refutation is already sitting on the PR is the single most
      expensive mistake this panel makes: it burns the author's trust and costs
      a full round.

      {{steps.synthesize.output}}

  - id: report
    subagent: review-synthesizer
    depends_on: [verify]
    prompt: |
      Final pass for the review of PR #{{inputs.pr}}: the verifier has
      annotated the findings below. Drop the "refuted" ones, keep "uncertain"
      ones marked as such, re-rank, and produce the deliverable: the prose
      brief first (overall risk, fix-first item, what the panel disagreed on,
      what verification changed, any Gaps — including a skipped structural
      pass), then the canonical fenced findings JSON as the FINAL block of
      your reply.

      ## Account for what this panel said before

      If the prior-requests block below is non-empty, then BEFORE the findings
      JSON emit a fenced ```json block of dispositions — one row per prior
      **blocker or major**, no exceptions:

      ```json
      [{"prior": "path/to/file.py:42", "disposition": "fixed", "why": "the new
      head adds the isinstance guard ahead of the state flip"}]
      ```

      `disposition` is exactly one of `fixed` (say WHICH change fixed it),
      `open` (it survives — carry it into your findings array too), or
      `refuted` (it was wrong; say what evidence shows that).

      A prior blocker/major that simply stops being mentioned is the failure
      this exists to prevent: a confirmed major once vanished from a round into
      a clean PASS, the standing block lifted, and the defect merged 44 seconds
      later. "I didn't see it this time" is not a disposition — if you cannot
      tell whether it was fixed, say `open` and let the next round settle it.

      ## Prior requests
      <prior_requests>
      {{inputs.prior_requests}}
      </prior_requests> Carry every surviving finding's `verdict` and `note` fields
      into that final JSON verbatim — a reprint that drops them erases the
      verify pass for downstream parsers.

      {{steps.verify.output}}
output: "{{steps.report.output}}"
